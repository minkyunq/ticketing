name: Build Ticketing EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: 📥 코드 체크아웃
        uses: actions/checkout@v4

      - name: 🐍 Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 패키지 설치
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: 🏗️ EXE 빌드
        run: |
          mkdir image
          pyinstaller --onefile --windowed --name "ticketing" --add-data "image;image" ticketing.py

      - name: 📤 EXE 업로드
        uses: actions/upload-artifact@v4
        with:
          name: 티켓팅매크로
          path: dist/ticketing.exe
